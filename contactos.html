<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtesaGest - Contactos</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/contactos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h1><i class="fas fa-cogs"></i> ArtesaGest</h1>
        </div>
        <div class="sidebar-nav">
            <a href="dashboard.html"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a>
            <a href="inventario.html"><i class="fas fa-boxes"></i> <span>Inventario</span></a>
            <a href="produccion.html"><i class="fas fa-industry"></i> <span>Producción</span></a>
            <a href="pos.html"><i class="fas fa-cash-register"></i> <span>Punto de Venta</span></a>
            <a href="reportes.html"><i class="fas fa-file-alt"></i> <span>Reportes</span></a>
            <a href="contactos.html" class="active"><i class="fas fa-address-book"></i> <span>Contactos</span></a>
        </div>
    </nav>

    <main class="main-content">
        <header class="header">
            <h2><i class="fas fa-address-book"></i> Contactos</h2>
            <div class="header-right">
                <span id="userName"></span>
                <a href="#" id="logoutBtn" class="btn btn-sm btn-danger">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </a>
            </div>
        </header>

        <div class="content">
            <div class="page-header">
                <h1>Gestión de Contactos</h1>
                <button class="btn btn-primary" onclick="Contactos.openModal()">
                    <i class="fas fa-plus"></i> Nuevo Contacto
                </button>
            </div>

            <div class="contactos-stats">
                <div class="stat-card">
                    <h3><i class="fas fa-users"></i> Total Contactos</h3>
                    <div class="value" id="totalContactos">0</div>
                </div>
                <div class="stat-card">
                    <h3><i class="fas fa-building"></i> Proveedores</h3>
                    <div class="value" id="totalProveedores">0</div>
                </div>
            </div>

            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar contacto..." oninput="Contactos.search()">
            </div>

            <div class="contactos-filters">
                <div class="filter-group">
                    <label>Tipo:</label>
                    <select id="tipoFiltro" class="form-control" onchange="Contactos.filter()">
                        <option value="">Todos</option>
                        <option>Cliente</option>
                        <option>Proveedor</option>
                        <option>Empleado</option>
                        <option>Otro</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Tipo</th>
                                    <th>Teléfono</th>
                                    <th>Email</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="contactosTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Nuevo Contacto</h3>
                <button class="modal-close" onclick="Contactos.closeModal()">&times;</button>
            </div>
            <form id="contactoForm">
                <div class="modal-body">
                    <input type="hidden" id="contactoId">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Nombre *</label>
                            <input type="text" id="nombre" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Tipo</label>
                            <select id="tipo" class="form-control">
                                <option>Cliente</option>
                                <option>Proveedor</option>
                                <option>Empleado</option>
                                <option>Otro</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Teléfono</label>
                            <input type="tel" id="telefono" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" class="form-control">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Dirección</label>
                        <input type="text" id="direccion" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Notas</label>
                        <textarea id="notas" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="Contactos.closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/contactos.js"></script>
</body>
</html>
