<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>ArtesaGest - Acceso</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="login-body">
        <div class="login-container">
            <div class="brand">
                <h1>🔨 ArtesaGest</h1>
                <p>Tu taller inteligente</p>
            </div>
            <div class="form-group">
                <label for="userInput">Nombre del Artesano</label>
                <input type="text" id="userInput" placeholder="Ej: Juan">
            </div>
            <div class="form-group">
                <label for="keyInput">Gemini API Key</label>
                <input type="password" id="keyInput" placeholder="sk-...">
            </div>
            <button id="btnLogin" class="btn-primary">Ingresar al Taller</button>
            <div class="login-footer">
                <p>🔒 Tus datos están seguros localmente</p>
            </div>
        </div>
    </div>

    <script src="login.js"></script>

</body>

</html>
