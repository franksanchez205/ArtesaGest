<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtesaGest - Punto de Venta</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/pos.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h1><i class="fas fa-cogs"></i> ArtesaGest</h1>
        </div>
        <div class="sidebar-nav">
            <a href="dashboard.html"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a>
            <a href="inventario.html"><i class="fas fa-boxes"></i> <span>Inventario</span></a>
            <a href="produccion.html"><i class="fas fa-industry"></i> <span>Producción</span></a>
            <a href="pos.html" class="active"><i class="fas fa-cash-register"></i> <span>Punto de Venta</span></a>
            <a href="reportes.html"><i class="fas fa-file-alt"></i> <span>Reportes</span></a>
            <a href="contactos.html"><i class="fas fa-address-book"></i> <span>Contactos</span></a>
        </div>
    </nav>

    <main class="main-content">
        <header class="header">
            <h2><i class="fas fa-cash-register"></i> Punto de Venta</h2>
            <div class="header-right">
                <span id="userName"></span>
                <a href="#" id="logoutBtn" class="btn btn-sm btn-danger">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </a>
            </div>
        </header>

        <div class="content">
            <div class="pos-layout">
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-boxes"></i> Productos Disponibles</h3>
                    </div>
                    <div class="card-body">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchProducts" placeholder="Buscar producto..." oninput="POS.filterProducts()">
                        </div>
                        <div class="pos-products" id="productsGrid"></div>
                    </div>
                </div>

                <div class="pos-cart">
                    <h3 style="margin-bottom: 15px;"><i class="fas fa-shopping-cart"></i> Carrito</h3>
                    <div class="pos-cart-items" id="cartItems"></div>
                    <div class="pos-total">
                        <span>Total:</span>
                        <span id="cartTotal">$0.00</span>
                    </div>

                    <div class="form-group" style="margin: 15px 0;">
                        <label>Cliente</label>
                        <input type="text" id="cliente" class="form-control" placeholder="Nombre del cliente (opcional)">
                    </div>
                    <div class="form-group">
                        <label>Método de Pago</label>
                        <select id="metodoPago" class="form-control">
                            <option>Efectivo</option>
                            <option>Tarjeta</option>
                            <option>Transferencia</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Pago con $</label>
                        <input type="number" id="pagoCon" class="form-control" min="0" placeholder="Monto recibido">
                    </div>
                    <div class="pos-cambio">
                        <span>Cambio:</span>
                        <span id="cambio">$0.00</span>
                    </div>

                    <button class="btn btn-success btn-block btn-lg" onclick="POS.completeSale()" style="margin-top: 15px;">
                        <i class="fas fa-check"></i> Completar Venta
                    </button>
                    <button class="btn btn-secondary btn-block" onclick="POS.clearCart()" style="margin-top: 10px;">
                        <i class="fas fa-trash"></i> Limpiar
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modalVenta">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-check-circle"></i> Venta Completada</h3>
                <button class="modal-close" onclick="POS.closeVentaModal()">&times;</button>
            </div>
            <div class="modal-body venta-success">
                <i class="fas fa-check-circle"></i>
                <h2>Venta Registrada</h2>
                <p class="total">Total: <strong id="ventaTotal"></strong></p>
                <p class="cambio">Cambio: <strong id="ventaCambio"></strong></p>
                <button class="btn btn-primary btn-lg" onclick="POS.closeVentaModal()" style="margin-top: 20px;">
                    Nueva Venta
                </button>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pos.js"></script>
</body>
</html>
