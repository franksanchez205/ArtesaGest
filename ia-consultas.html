<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtesaGest - Taller</title>
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
</head>

<body>

    <nav>
        <a href="dashboard.html">🛠 Dashboard</a> |
        <a href="index.html">🚪 Salir</a>
    </nav>

    <hr>

    <h2>🛠 Control de Producción</h2>

    <!-- API Key -->
    <fieldset>
        <legend>🔑 Gemini API Key</legend>
        <input type="password" id="apiKey" placeholder="AIzaSy..." size="40">
        <button onclick="guardarKey()">Guardar</button>
        <p id="keyStatus"></p>
    </fieldset>

    <br>

    <!-- Registrar pieza -->
    <fieldset>
        <legend>Nueva pieza</legend>
        <label>Nombre:
            <input type="text" id="nombreProd" placeholder="Ej: Jarrón de Madera">
        </label>
        &nbsp;
        <label>Prioridad:
            <select id="prioridad">
                <option value="Alta">Alta</option>
                <option value="Media" selected>Media</option>
                <option value="Baja">Baja</option>
            </select>
        </label>
        &nbsp;
        <button id="btnAgregar">+ Registrar</button>
    </fieldset>

    <br>

    <!-- Tabla de órdenes -->
    <table cellpadding="6" cellspacing="0">
        <thead>
            <tr>
                <th>#</th>
                <th>Producto</th>
                <th>Prioridad</th>
                <th>Fase</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="listaProduccion">
            <tr id="emptyRow">
                <td colspan="5">Sin piezas registradas aún.</td>
            </tr>
        </tbody>
    </table>

    <br>

    <!-- Botón IA -->
    <button id="btnAnalizarIA">💡 Consultar Maestro Artesano (IA)</button>

    <p id="loader" style="display:none">Analizando el taller...</p>

    <!-- Output IA -->
    <div id="outputIA" style="display:none">
        <hr>
        <strong>🧑‍🎨 Consejo del Maestro Artesano:</strong>
        <p id="textoIA"></p>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        let ordenes = JSON.parse(localStorage.getItem('ordenes')) || [];

        // ── API Key ──────────────────────────────────────────
        window.guardarKey = () => {
            const k = document.getElementById('apiKey').value.trim();
            if (!k) return alert("Ingresa una API Key válida");
            localStorage.setItem('geminiKey', k);
            document.getElementById('keyStatus').textContent = '✅ API Key guardada';
        };

        const savedKey = localStorage.getItem('geminiKey');
        if (savedKey) {
            document.getElementById('apiKey').value = savedKey;
            document.getElementById('keyStatus').textContent = '✅ API Key cargada';
        }

        // ── Render tabla ─────────────────────────────────────
        function renderizarTabla() {
            const tbody = document.getElementById('listaProduccion');
            tbody.innerHTML = '';

            if (ordenes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">Sin piezas registradas aún.</td></tr>';
                return;
            }

            const fases = ['Corte', 'Lijado', 'Pintado', 'Terminado'];

            ordenes.forEach((orden, index) => {
                const fila = document.createElement('tr');
                fila.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${orden.nombre}</td>
                    <td>${orden.prioridad}</td>
                    <td>
                        <select onchange="actualizarEstado(${orden.id}, this.value)">
                            ${fases.map(f => `<option ${orden.estado === f ? 'selected' : ''}>${f}</option>`).join('')}
                        </select>
                    </td>
                    <td><button onclick="eliminarOrden(${orden.id})">Eliminar</button></td>
                `;
                tbody.appendChild(fila);
            });
        }

        // ── Agregar orden ─────────────────────────────────────
        document.getElementById('btnAgregar').addEventListener('click', () => {
            const nombre = document.getElementById('nombreProd').value.trim();
            const prioridad = document.getElementById('prioridad').value;

            if (!nombre) return alert("Escribe el nombre del producto");
            if (ordenes.some(o => o.nombre.toLowerCase() === nombre.toLowerCase())) {
                return alert("Ya existe una pieza con ese nombre.");
            }

            ordenes.push({ id: Date.now(), nombre, prioridad, estado: 'Corte' });
            localStorage.setItem('ordenes', JSON.stringify(ordenes));
            renderizarTabla();
            document.getElementById('nombreProd').value = '';
        });

        // ── Funciones globales ────────────────────────────────
        window.actualizarEstado = (id, nuevoEstado) => {
            const orden = ordenes.find(o => o.id === id);
            if (orden) {
                orden.estado = nuevoEstado;
                localStorage.setItem('ordenes', JSON.stringify(ordenes));
            }
        };

        window.eliminarOrden = (id) => {
            if (!confirm("¿Eliminar esta pieza?")) return;
            ordenes = ordenes.filter(o => o.id !== id);
            localStorage.setItem('ordenes', JSON.stringify(ordenes));
            renderizarTabla();
        };

        // ── Análisis IA ───────────────────────────────────────
        document.getElementById('btnAnalizarIA').addEventListener('click', async () => {
            const key = localStorage.getItem('geminiKey') || document.getElementById('apiKey').value.trim();
            if (!key) return alert("Ingresa y guarda tu API Key primero");

            const loader = document.getElementById('loader');
            const outputIA = document.getElementById('outputIA');
            const textoIA = document.getElementById('textoIA');
            const btnIA = document.getElementById('btnAnalizarIA');

            let dataContexto = "Estado actual del taller:\n";
            ordenes.length === 0
                ? dataContexto += "(Sin piezas registradas)\n"
                : ordenes.forEach(o => {
                    dataContexto += `Producto: ${o.nombre} | Prioridad: ${o.prioridad} | Fase: ${o.estado}\n`;
                });

            try {
                loader.style.display = 'block';
                outputIA.style.display = 'none';
                btnIA.disabled = true;

                const genAI = new GoogleGenerativeAI(key);
                const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash" });

                const prompt = `Actúa como un maestro artesano con 30 años de experiencia. Revisa estas órdenes de taller y dame:
1. Qué pieza debería ser mi prioridad hoy y por qué.
2. Consejos concretos para las piezas en fase de Lijado y Pintado.
3. Una recomendación general para optimizar el flujo del taller.

${dataContexto}`;

                const result = await model.generateContent(prompt);
                const response = await result.response;

                textoIA.innerText = response.text();
                outputIA.style.display = 'block';
            } catch (error) {
                console.error(error);
                alert("Error al conectar con Gemini: " + error.message);
            } finally {
                loader.style.display = 'none';
                btnIA.disabled = false;
            }
        });

        renderizarTabla();
    </script>


    <script src="js/dashboard.js"></script>

</body>
</html>
