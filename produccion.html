<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtesaGest - Producción</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/produccion.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h1><i class="fas fa-cogs"></i> ArtesaGest</h1>
        </div>
        <div class="sidebar-nav">
            <a href="dashboard.html"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a>
            <a href="inventario.html"><i class="fas fa-boxes"></i> <span>Inventario</span></a>
            <a href="produccion.html" class="active"><i class="fas fa-industry"></i> <span>Producción</span></a>
            <a href="pos.html"><i class="fas fa-cash-register"></i> <span>Punto de Venta</span></a>
            <a href="reportes.html"><i class="fas fa-file-alt"></i> <span>Reportes</span></a>
            <a href="contactos.html"><i class="fas fa-address-book"></i> <span>Contactos</span></a>
        </div>
    </nav>

    <main class="main-content">
        <header class="header">
            <h2><i class="fas fa-industry"></i> Producción</h2>
            <div class="header-right">
                <span id="userName"></span>
                <a href="#" id="logoutBtn" class="btn btn-sm btn-danger">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </a>
            </div>
        </header>

        <div class="content">
            <div class="page-header">
                <h1>Órdenes de Producción</h1>
                <button class="btn btn-primary" onclick="Produccion.openModal()">
                    <i class="fas fa-plus"></i> Nueva Orden
                </button>
            </div>

            <div class="produccion-stats">
                <div class="stat-card">
                    <i class="fas fa-cut" style="color: #e74c3c;"></i>
                    <h3>Corte</h3>
                    <div class="value" id="countCorte">0</div>
                </div>
                <div class="stat-card warning">
                    <i class="fas fa-file-alt" style="color: #f39c12;"></i>
                    <h3>Lijado</h3>
                    <div class="value" id="countLijado">0</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-paint-brush" style="color: #3498db;"></i>
                    <h3>Pintura</h3>
                    <div class="value" id="countPintura">0</div>
                </div>
                <div class="stat-card success">
                    <i class="fas fa-check-circle" style="color: #27ae60;"></i>
                    <h3>Terminado</h3>
                    <div class="value" id="countTerminado">0</div>
                </div>
            </div>

            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar orden..." oninput="Produccion.search()">
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Producto</th>
                                    <th>Cantidad</th>
                                    <th>Estado</th>
                                    <th>Fecha</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="produccionTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Nueva Orden</h3>
                <button class="modal-close" onclick="Produccion.closeModal()">&times;</button>
            </div>
            <form id="ordenForm">
                <div class="modal-body">
                    <div class="form-group">
                        <label>Producto *</label>
                        <input type="text" id="producto" class="form-control" required placeholder="Nombre del producto">
                    </div>
                    <div class="form-group">
                        <label>Cantidad *</label>
                        <input type="number" id="cantidad" class="form-control" min="1" value="1" required>
                    </div>
                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea id="descripcion" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="Produccion.closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Crear Orden</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="modalEstado">
        <div class="modal">
            <div class="modal-header">
                <h3>Avanzar Estado</h3>
                <button class="modal-close" onclick="Produccion.closeEstadoModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p id="currentEstado"></p>
                <div class="form-group">
                    <label>Nuevo Estado</label>
                    <select id="nuevoEstado" class="form-control">
                        <option value="Corte">Corte</option>
                        <option value="Lijado">Lijado</option>
                        <option value="Pintura">Pintura</option>
                        <option value="Terminado">Terminado</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Notas</label>
                    <textarea id="notas" class="form-control" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="Produccion.closeEstadoModal()">Cancelar</button>
                <button type="button" class="btn btn-success" onclick="Produccion.updateEstado()">
                    <i class="fas fa-forward"></i> Avanzar
                </button>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/produccion.js"></script>
</body>
</html>
